name: Generate YT Playlist

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: gradle build --no-daemon

      - name: Generate playlist
        run: java -jar build/libs/yt-m3u-1.0.jar

      - name: Commit playlist
        run: |
          git config --global user.name "playlist-bot"
          git config --global user.email "bot@github.com"
          git add playlist.m3u cache.json
          git commit -m "Auto update playlist" || echo "No changes"
          git push
